<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Строй-Админ | Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginForm" class="login-container">
        <img class="logo" src="logo.png" alt="">
        <h2>Вход в систему</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-login" onclick="login()">Войти</button>
    </div>

    <div id="mainApp" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2> Строй-Админ</h2>
            <button class="btn btn-logout" onclick="logout()">Выйти</button>
        </div>
        
        <button class="main-add-btn" onclick="openAddModal()">+ Добавить рабочего</button>
        <div id="mainContent"></div>
    </div>

    <div id="loader" class="hidden">Загрузка...</div>

    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <h3>Новый сотрудник</h3>
            <input type="text" id="newName" placeholder="Имя и Фамилия">
            <input type="date" id="newDate">
            <select id="newTeam">
                <option value="Кладочники">Кладочники</option>          
                <option value="Бетонщики">Бетонщики</option>
                <option value="Разнорабочие">Разнорабочие</option>
                <option value="Штукатуршики">Штукатуршики</option>
                <option value="Фасадчики">Фасадчики</option>
                <option value="Сантехники">Сантехники</option>
                <option value="Электрики">Электрики</option>
                <option value="Крановшик">Крановшик</option>
                <option value="Сваршики">Сваршики</option>
            </select>
            <button class="btn btn-login" onclick="saveWorker()">Сохранить</button>
            <button class="btn" style="background:#eee; margin-top:5px;" onclick="closeModals()">Отмена</button>
        </div>
    </div>

    <div id="infoModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="infoName" style="color:var(--primary)">Имя</h3>
            <p>📅 <strong>Дата:</strong> <span id="infoDate"></span></p>
            <p>👷 <strong>Бригада:</strong> <span id="infoTeam"></span></p>
            <button id="deleteBtn" class="btn" style="background:#dc3545; color:white;">Удалить рабочего</button>
            <button class="btn" style="background:#eee; margin-top:5px;" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
